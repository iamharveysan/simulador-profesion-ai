<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>USB Bogotá · ¿Cómo me veré en mi profesión?</title>
<style>
  :root{ --negro:#0b0b0b; --naranja:#f37021; --gris:#1a1a1a; --borde:#2a2a2a; --texto:#f2f2f2; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--negro);color:var(--texto);font-family:system-ui,Segoe UI,Roboto,Arial}
  a{color:inherit}
  .header{position:sticky; top:0; z-index:10; display:flex; gap:16px; align-items:center; justify-content:space-between;
    padding:12px 18px; background:linear-gradient(180deg, rgba(243,112,33,.18), rgba(0,0,0,0)); border-bottom:1px solid var(--borde)}
  .brand{display:flex; align-items:center; gap:12px}
  .brand img{height:38px}
  .brand h1{font-size:16px; margin:0}
  .cta{display:inline-flex; align-items:center; gap:8px; background:var(--naranja); color:#111; font-weight:800;
    text-decoration:none; padding:10px 14px; border-radius:10px; border:1px solid #ff8f4e}
  .wrap{display:grid; place-items:center; min-height:calc(100dvh - 70px)}
  .card{width:min(1000px,92vw); background:var(--gris); border:1px solid var(--borde); border-radius:16px; padding:22px;
    box-shadow:0 10px 30px rgba(0,0,0,.35)}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:16px}
  .box{border:1px dashed var(--borde); border-radius:12px; display:grid; place-items:center; min-height:320px;
    overflow:hidden; padding:10px; background:#121212}
  video,canvas,img{max-width:100%; border-radius:10px}
  input,button,textarea,select{width:100%; padding:12px; border-radius:12px; border:1px solid var(--borde);
    background:#0f0f0f; color:var(--texto)}
  button{cursor:pointer; font-weight:800}
  .btn-primary{background:var(--naranja); color:#111; border-color:#ff944d}
  .btn-ghost{background:transparent}
  .row{display:flex; gap:10px; flex-wrap:wrap}
  small{opacity:.75}
  .loader{width:72px;height:72px;border-radius:50%; border:5px solid #3a3a3a;border-top-color:var(--naranja);
    animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .history{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px}
  .thumb{position:relative; border:1px solid var(--borde); border-radius:10px; overflow:hidden; background:#0f0f0f}
  .thumb img{width:100%; display:block}
  .chip{position:absolute; left:6px; bottom:6px; font-size:11px; background:rgba(0,0,0,.6); padding:4px 6px;
    border-radius:6px; border:1px solid rgba(255,255,255,.15)}
  .footer{padding:18px; text-align:center; color:#bbb; font-size:13px}
  .footer a{color:var(--naranja); font-weight:700; text-decoration:none}
  @media (max-width:860px){ .grid{grid-template-columns:1fr} }
</style>
</head>
<body>
<header class="header">
  <div class="brand">
    <img src="usb-logo.png" alt="Universidad de San Buenaventura Bogotá (logo)" onerror="this.style.display='none'">
    <h1>Universidad de San Buenaventura Bogotá</h1>
  </div>
  <a class="cta" href="https://www.usbbog.edu.co/pregrados/" target="_blank" rel="noopener">Explora Pregrados</a>
</header>

<main class="wrap">
  <div class="card">
    <h2 style="margin-top:0">Transforma tu foto · Elige tu programa</h2>

    <div class="row" style="margin-bottom:12px">
      <div style="flex:1 1 260px">
        <label>Programa</label>
        <select id="preset">
          <option value="psicologia">Psicología</option>
          <option value="educacionInfantil">Licenciatura en Educación Infantil</option>
          <option value="filosofia">Licenciatura en Filosofía</option>
          <option value="teologia">Licenciatura en Teología</option>
          <option value="lenguaInglesa">Profesional en Lengua Inglesa</option>
          <option value="sistemas">Ingeniería de Sistemas</option>
          <option value="electronica">Ingeniería Electrónica</option>
          <option value="aeronautica">Ingeniería Aeronáutica</option>
          <option value="mecatronica">Ingeniería Mecatrónica</option>
          <option value="multimedia">Ingeniería Multimedia</option>
          <option value="sonido">Ingeniería de Sonido</option>
          <option value="administracion">Administración de Empresas</option>
          <option value="contaduria">Contaduría Pública</option>
          <option value="cienciaPolitica">Ciencia Política</option>
          <option value="derecho">Derecho</option>
          <option value="relacionesInternacionales">Relaciones Internacionales</option>
        </select>
      </div>
      <div style="flex:3 1 420px">
        <label>Tu indicación</label>
        <textarea id="prompt" rows="2" placeholder="Se rellenará con el programa elegido"></textarea>
      </div>
    </div>

    <div class="grid">
      <div class="box">
        <div style="text-align:center">
          <video id="cam" autoplay playsinline></video><br><br>
          <div class="row">
            <button id="start" class="btn-ghost">Encender cámara</button>
            <button id="snap" class="btn-ghost">Tomar foto</button>
          </div>
          <p><small>o selecciona un archivo:</small></p>
          <input id="file" type="file" accept="image/*" />
        </div>
      </div>
      <div class="box">
        <canvas id="canvas" width="640" height="640"></canvas>
      </div>
    </div>

    <br>
    <div class="row">
      <button id="go" class="btn-primary">Generar imagen</button>
      <a id="dl" class="btn-ghost" download="" href="#" aria-disabled="true" style="pointer-events:none;opacity:.6;text-decoration:none;display:inline-flex;align-items:center;gap:8px">
        Descargar
      </a>
      <button id="clear" class="btn-ghost">Limpiar</button>
    </div>

    <br>
    <div class="box" id="out"><small>Resultado</small></div>

    <h3 style="margin:18px 0 8px">Historial</h3>
    <div id="history" class="history"></div>

    <p><small>Privacidad: la foto se usa solo para esta generación y se descarta.</small></p>
  </div>
</main>

<footer class="footer">
  Sitio oficial: <a href="https://www.usbbog.edu.co/pregrados/" target="_blank" rel="noopener">usbbog.edu.co/pregrados</a>
</footer>

<script>
const cam = document.getElementById('cam');
const start = document.getElementById('start');
const snap = document.getElementById('snap');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const file = document.getElementById('file');
const go = document.getElementById('go');
const out = document.getElementById('out');
const promptEl = document.getElementById('prompt');
const clearBtn = document.getElementById('clear');
const preset = document.getElementById('preset');
const dlBtn = document.getElementById('dl');
const historyEl = document.getElementById('history');

let stream;

/* ==== PROMPTS EN INGLÉS (creativos, cinematográficos) ==== */
const prompts = {
  psicologia:
  "Transform this photo into a futuristic portrait of a psychology professional. Keep the person’s authentic facial features with a warm smile and empathetic, charismatic eyes. Dress them in a modern, minimalist suit with elegant technological touches (navy, metallic gray, or black with subtle glow). Set a clean, futuristic background with soft tones and diffused lights that convey ethics, trust, and human professionalism. Hyper-realistic, high-definition, cinematic feel; project innovation, serenity, and a visionary spirit.",
  educacionInfantil:
  "Transform this photo into an inspiring portrait of an Early Childhood Education professional. Preserve authentic facial features with a joyful, energetic expression. Dress in comfortable, modern teaching attire with playful color accents. Set a bright, colorful classroom with learning tools, drawings, and smiling children interacting. Soft daylight, cheerful atmosphere, hyper-realistic style that conveys creativity, care, and pedagogical excellence.",
  filosofia:
  "Transform this photo into an elegant portrait of a Philosophy graduate. Keep authentic facial features with a reflective, confident look. Dress in refined academic attire (earth tones or deep blue). Set a classic library background with tall shelves, open books, and warm light beams. Hyper-realistic, cinematic atmosphere that evokes intellect, clarity, and the pursuit of truth.",
  teologia:
  "Transform this photo into a serene portrait of a Theology graduate. Keep authentic facial features with a calm, respectful expression. Dress in formal, understated attire. Set a quiet space with subtle sacred symbols, warm ambient light, and dignified composition. Hyper-realistic, high-definition style that communicates ethics, contemplation, and service.",
  lenguaInglesa:
  "Transform this photo into a dynamic portrait of an English Language professional. Preserve authentic facial features with a friendly, confident smile. Dress in modern academic attire with subtle international accents. Set a multicultural classroom with English phrases on boards and world flags. Bright, clean lighting, hyper-realistic style that conveys communication, global vision, and teaching excellence.",
  sistemas:
  "Transform this photo into a visionary portrait of a Systems Engineer. Keep authentic facial features with a focused, innovative gaze. Dress in smart-casual tech attire. Set a futuristic office with holographic interfaces, code on screens, and data visualizations. Cool-toned lighting, hyper-realistic, cinematic look that projects innovation, scalability, and clean architecture thinking.",
  electronica:
  "Transform this photo into a high-tech portrait of an Electronic Engineer. Keep authentic features with a concentrated, inventive look. Dress in modern lab attire with ESD wristband. Set a laboratory with PCBs, oscilloscopes, microcontrollers, and soldering tools. Crisp lighting, hyper-realistic style that communicates precision, experimentation, and problem-solving.",
  aeronautica:
  "Transform this photo into a striking portrait of an Aeronautical Engineer. Keep authentic features with a determined, visionary look. Dress in modern engineer uniform or jacket with subtle reflective details. Set an advanced aerospace hangar with aircraft, turbines, and blueprint overlays. Bright, clean light; hyper-realistic, cinematic style that conveys precision, safety, and exploration.",
  mecatronica:
  "Transform this photo into a dynamic portrait of a Mechatronics Engineer. Keep authentic features with a confident, creative expression. Dress in tech-work attire with utility details. Set a robotics lab with robotic arms, sensors, and automated systems. Controlled lighting with soft glows; hyper-realistic style that communicates integration, control, and innovation.",
  multimedia:
  "Transform this photo into a creative portrait of a Multimedia Engineer. Keep authentic features with an expressive, artistic look. Dress in modern creative attire. Set a digital studio with cameras, LED panels, and multiple screens showing motion graphics and UX. Vibrant but balanced color, hyper-realistic cinematic style that conveys storytelling, design, and interactivity.",
  sonido:
  "Trnsform ths photo into an authentic portrait of a Sound Engineer. Keep facial features with a focused yet friendly expression. Dress in studio attire (black or dark gray). Set a professional recording studio with mixing consoles, microphones, and acoustic panels. Warm, directional light; hyper-realistic style that conveys fidelity, balance, and musical sensitivity.",
  administracion:
  "Transform this photo into a dynamic portrait of a Business Administration professional. Keep authentic features with a confident smile and strategic gaze. Dress in a modern corporate suit (navy, charcoal, or black with subtle metallic accents). Set a futuristic boardroom with holographic charts and skyline view. Hyper-realistic cinematic look that conveys leadership, innovation, and global vision.",
  contaduria:
  "Transform this photo into a precise portrait of a Public Accounting professional. Keep authentic features with a trustworthy, meticulous expression. Dress in formal business attire. Set a clean office with financial statements, calculators, and dashboards on screens. Neutral, soft lighting; hyper-realistic style that conveys integrity, accuracy, and transparency.",
  cienciaPolitica:
  "Transform this photo into a compelling portrait of a Political Science professional. Keep authentic features with a thoughtful, persuasive expression. Dress in formal attire. Set an institutional environment with flags, debate setting, and press backdrop. Warm directional light; hyper-realistic cinematic style that conveys analysis, public service, and democratic values.",
  derecho:
  "Transform this photo into a powerful portrait of a Law professional. Keep authentic features with a confident, assertive look. Dress in a classic, elegant suit or legal robes. Set a grand courtroom with columns, law books, and warm light. Hyper-realistic cinematic style that conveys justice, ethics, and authority.",
  relacionesInternacionales:
  "Transform this photo into a sophisticated portrait of an International Relations professional. Keep authentic features with a diplomatic, confident expression. Dress in refined formal attire with subtle global accents. Set a modern diplomatic venue with world flags, glass architecture, and city skyline. Clean, soft lighting; hyper-realistic style that conveys cooperation, strategy, and cultural fluency."
};

/* Sincronización select → textarea */
let userEdited = false;
promptEl.addEventListener('input', () => { userEdited = true; });
function applyPreset(force=false){ const base = prompts[preset.value] || ''; if (force || !userEdited) promptEl.value = base; }
document.addEventListener('DOMContentLoaded', () => applyPreset(true));
preset.addEventListener('change', () => { userEdited = false; applyPreset(true); });

/* Cámara */
start.onclick = async () => {
  try { stream = await navigator.mediaDevices.getUserMedia({ video:{ width:640, height:640 } }); cam.srcObject = stream; }
  catch { alert("No se pudo acceder a la cámara."); }
};
snap.onclick = () => { if (!cam.srcObject) return alert("Enciende la cámara primero."); ctx.drawImage(cam,0,0,canvas.width,canvas.height); };

/* Subir archivo */
file.onchange = () => {
  const f = file.files?.[0]; if (!f) return;
  const img = new Image();
  img.onload = () => {
    const s = Math.min(img.width,img.height), sx=(img.width-s)/2, sy=(img.height-s)/2;
    ctx.drawImage(img,sx,sy,s,s,0,0,canvas.width,canvas.height);
  };
  img.src = URL.createObjectURL(f);
};

/* UI extra */
clearBtn.onclick = () => { ctx.clearRect(0,0,canvas.width,canvas.height); out.innerHTML="<small>Resultado</small>"; disableDownload(); };
function showLoader(){ out.innerHTML = '<div class="loader" aria-label="Generando..."></div>'; }

/* Descarga */
function enableDownload(filename,b64){ dlBtn.href=`data:image/png;base64,${b64}`; dlBtn.download=filename; dlBtn.style.pointerEvents="auto"; dlBtn.style.opacity="1"; dlBtn.setAttribute("aria-disabled","false"); }
function disableDownload(){ dlBtn.href="#"; dlBtn.removeAttribute("download"); dlBtn.style.pointerEvents="none"; dlBtn.style.opacity=".6"; dlBtn.setAttribute("aria-disabled","true"); }

/* Historial */
function addToHistory(b64,label){
  const div=document.createElement('div'); div.className='thumb'; div.title=label;
  const img=new Image(); img.src=`data:image/png;base64,${b64}`; img.alt=label;
  const chip=document.createElement('div'); chip.className='chip'; chip.textContent=label;
  div.appendChild(img); div.appendChild(chip);
  div.onclick=()=>{ const big=new Image(); big.src=img.src; out.innerHTML=""; out.appendChild(big); enableDownload(`USB_${slugify(preset.value)}_${timestamp()}.png`, b64); };
  historyEl.prepend(div);
}
function slugify(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'_'); }
function timestamp(){ const d=new Date(), p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}`; }

/* ===== Overlay institucional: “USB” arriba y texto abajo ===== */
async function applyUsbOverlayToBase64(b64){
  const img=new Image(); img.src=`data:image/png;base64,${b64}`; await img.decode();
  const c=document.createElement('canvas'), w=img.naturalWidth, h=img.naturalHeight; c.width=w; c.height=h;
  const cx=c.getContext('2d'); cx.drawImage(img,0,0,w,h);
  const pad=Math.round(w*0.03), topFont=Math.round(w*0.08), bottomFont=Math.round(w*0.035);
  cx.shadowColor="rgba(0,0,0,.6)"; cx.shadowBlur=Math.max(2,Math.round(w*0.004)); cx.lineWidth=Math.max(2,Math.round(w*0.004));
  cx.font=`900 ${topFont}px system-ui,Segoe UI,Roboto,Arial`; cx.textBaseline="top"; cx.fillStyle="#f37021"; cx.strokeStyle="rgba(0,0,0,.85)";
  cx.strokeText("USB", pad, pad); cx.fillText("USB", pad, pad);
  const footer="Universidad de San Buenaventura Bogotá";
  cx.font=`700 ${bottomFont}px system-ui,Segoe UI,Roboto,Arial`; cx.textBaseline="bottom"; cx.textAlign="center";
  const y=h-pad; cx.strokeText(footer,w/2,y); cx.fillStyle="#ffffff"; cx.fillText(footer,w/2,y);
  return c.toDataURL("image/png").replace(/^data:image\/png;base64,/,"");
}

/* Generar */
go.onclick = async () => {
  showLoader();
  const blob = await new Promise(r=>canvas.toBlob(r,'image/png'));
  if(!blob){ out.innerHTML="<small>Primero captura o sube una foto.</small>"; return; }

  const typed=(promptEl.value||"").trim(), chosen=prompts[preset.value]||"", finalPrompt=typed.length?typed:chosen||"Transform this photo into a professional portrait.";
  const fd=new FormData(); fd.append('photo', blob, 'capture.png'); fd.append('prompt', finalPrompt);

  try{
    const res=await fetch('/render-edit',{method:'POST',body:fd});
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||"Error");
    const stampedB64 = await applyUsbOverlayToBase64(data.image_base64);
    const img=new Image(); img.src=`data:image/png;base64,${stampedB64}`;
    img.onload=()=>{ out.innerHTML=""; out.appendChild(img); const name=`USB_${slugify(preset.value)}_${timestamp()}.png`; enableDownload(name, stampedB64); addToHistory(stampedB64, preset.options[preset.selectedIndex].text); };
  }catch(e){ console.error(e); out.innerHTML="<small>Fallo al generar imagen.</small>"; disableDownload(); }
};
</script>
</body>
</html>
